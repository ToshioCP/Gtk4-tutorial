standalone: true
top-level-division: chapter
number-sections: true
shift-heading-level-by: 1
# Table of Contents settings
toc: true
toc-depth: 2
variables:
  has-frontmatter: true
  # The title page is generated by cover.tex, so we disable the default title page.
  header-includes: |
    \renewcommand{\maketitle}{}
include-before-body:
  - cover.tex
  - include-before.tex